name: SquidServers WinGet
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Fetch CDN Metadata
        id: cdn_data
        shell: bash
        run: |
          curl -s https://cdn.squidservers.com/latest.yml -o latest.yml
          VERSION=$(grep '^version:' latest.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Submit to WinGet
        shell: powershell
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          ./wingetcreate.exe new https://cdn.squidservers.com/squidservers-latest-setup.exe `
            --identifier SquidServers.SquidServers `
            --version ${{ steps.cdn_data.outputs.version }} `
            --urls https://cdn.squidservers.com/squidservers-latest-setup.exe `
            --name SquidServers `
            --publisher SquidServers `
            --description "SquidServers Application" `
            --license "Proprietary" `
            --token ${{ secrets.WINGET_TOKEN }} `
            --silent
